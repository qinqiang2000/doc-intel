version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apianything
      POSTGRES_PASSWORD: apianything
      POSTGRES_DB: apianything
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apianything"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://apianything:apianything@db:5432/apianything
      DEBUG: "false"
      SECRET_KEY: "CHANGE-ME-IN-PRODUCTION-USE-A-REAL-SECRET"
      UPLOAD_DIR: /app/data/uploads
      DEFAULT_PROCESSOR: mock
      # API keys for LLM processors (read from host env)
      # Gemini env var is API_KEY (matches gemini.py / models.yaml)
      API_KEY: "${API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    volumes:
      - uploads_data:/app/data/uploads
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  uploads_data:
