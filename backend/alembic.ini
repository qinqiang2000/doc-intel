# Alembic configuration for ApiAnything
# Doc: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template for new revision files
# file_template = %%(rev)s_%%(slug)s

# Timezone for revision file timestamps
# timezone = UTC

# Prepend sys.path entries (separated by newlines)
prepend_sys_path = .

# Version location separator
version_path_separator = os

# The database URL — overridden by env.py reading DATABASE_URL from environment
sqlalchemy.url = sqlite+aiosqlite:///./data/doc_intel.db

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
